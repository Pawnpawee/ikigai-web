version = 1

test_patterns = [
  "**/*.test.ts",
  "**/*.test.tsx",
  "**/__tests__/**"
]

exclude_patterns = [
  "**/node_modules/**",
  "**/.next/**",
  "**/out/**",
  "**/public/**",
  "**/coverage/**"
]

[[analyzers]]
name = "javascript"
enabled = true

  [analyzers.meta]
  environment = ["browser", "nodejs"]
  
  plugins = ["react"]

  [analyzers.meta.thresholds]
  max_issues = 0

[[transformers]]
name = "prettier"
enabled = true

[[analyzers]]
name = "secrets"
enabled = true